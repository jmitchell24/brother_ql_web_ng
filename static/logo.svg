<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" shape-rendering="geometricPrecision">
  <defs>
    <!-- Background gradient: deep blue-grey to near-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2d40"/>
      <stop offset="100%" stop-color="#0a0f14"/>
    </linearGradient>
    <!-- Bezel highlight gradient (top/left edge sheen) -->
    <linearGradient id="bezel-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bezel-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Printer icon glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Drop shadow for label strip -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background fill -->
  <rect width="200" height="200" rx="28" ry="28" fill="url(#bg)"/>

  <!-- Outer bezel: dark border ring -->
  <rect x="3" y="3" width="194" height="194" rx="25" ry="25"
        fill="none" stroke="#0a0f14" stroke-width="4"/>

  <!-- Inner bezel: light edge sheen (top) -->
  <rect x="5" y="5" width="190" height="190" rx="23" ry="23"
        fill="none" stroke="url(#bezel-top)" stroke-width="2.5"/>

  <!-- Inner bezel: light edge sheen (left) -->
  <rect x="5" y="5" width="190" height="190" rx="23" ry="23"
        fill="none" stroke="url(#bezel-left)" stroke-width="2.5"/>

  <!-- Inset shadow ring -->
  <rect x="7" y="7" width="186" height="186" rx="21" ry="21"
        fill="none" stroke="#000000" stroke-width="1.5" stroke-opacity="0.5"/>

  <!--
    Bootstrap Icons bi-printer path (16×16 viewBox), scaled and centered.
    Original: printer body + tray cutout + output tray + paper sheet
    Scaled ~6.5× and centered in 200×200 canvas (origin offset: 35, 30)
  -->
  <g transform="translate(35, 30) scale(8.125)" filter="url(#glow)">
    <!-- Paper sheet emerging from top -->
    <path d="M5 1a2 2 0 0 0-2 2v1h10V3a2 2 0 0 0-2-2z" fill="#e8eef5" opacity="0.95"/>
    <!-- Printer body -->
    <path d="M0 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2z" fill="#4a7fa5"/>
    <!-- Printer body highlight -->
    <path d="M0 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2H0z" fill="#5c96bf" opacity="0.5"/>
    <!-- Output tray (bottom slot) -->
    <path d="M2.5 0a.5.5 0 0 0-.5.5v1h12v-1a.5.5 0 0 0-.5-.5z" fill="#c8d8e8" opacity="0" />
    <!-- Paper output tray opening -->
    <rect x="3" y="12" width="10" height="3" rx="1" fill="#1e2d40"/>
    <!-- Output paper -->
    <path d="M4 12.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1H4.5a.5.5 0 0 1-.5-.5" fill="#e8eef5" opacity="0"/>
    <!-- Ink dot / status light -->
    <circle cx="13.5" cy="9" r="0.8" fill="#4ade80" opacity="0.9"/>
  </g>

  <!-- Label strip emerging from bottom of printer -->
  <rect x="62" y="136" width="76" height="22" rx="3" fill="#f0f4f8" filter="url(#shadow)"/>
  <!-- Label strip lines (simulating text/barcode) -->
  <rect x="70" y="141" width="30" height="3" rx="1.5" fill="#94a3b8" opacity="0.7"/>
  <rect x="70" y="147" width="20" height="2" rx="1" fill="#94a3b8" opacity="0.5"/>
  <!-- Barcode bars on right of strip -->
  <rect x="111" y="140" width="2" height="10" rx="0.5" fill="#64748b" opacity="0.8"/>
  <rect x="114.5" y="140" width="1" height="10" rx="0.5" fill="#64748b" opacity="0.8"/>
  <rect x="117" y="140" width="3" height="10" rx="0.5" fill="#64748b" opacity="0.8"/>
  <rect x="121.5" y="140" width="1.5" height="10" rx="0.5" fill="#64748b" opacity="0.8"/>
  <rect x="124" y="140" width="2" height="10" rx="0.5" fill="#64748b" opacity="0.8"/>
</svg>
